version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_network
  node_app:
    build: ./app
    container_name: nodejs_container
    restart: on-failure
    ports:
      - "3000:3000"
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      MONGO_URI: mongodb://admin:secretpassword@mongodb:27017/mydatabase?authSource=admin
      PORT: 3000
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mongo_data: